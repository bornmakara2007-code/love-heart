<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I LOVE U Heart Animation</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
}

#heart{
    position:relative;
    width:600px;
    height:600px;
}

.word{
    position:absolute;
    color:#ff4d6d;
    font-size:14px;
    font-weight:bold;
    text-shadow:
        0 0 5px #ff4d6d,
        0 0 10px #ff4d6d,
        0 0 20px #ff4d6d;
    animation: pulse 2s infinite;
}

.centerText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:48px;
    text-shadow:0 0 20px white;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.3);
    }
}
</style>
</head>

<body>

<div id="heart">
    <div class="centerText">I Love You.</div>
</div>

<script>
const heart = document.getElementById("heart");

for(let t = 0; t < Math.PI * 2; t += 0.12){

    const x = 16 * Math.pow(Math.sin(t),3);
    const y = -(13*Math.cos(t)
              -5*Math.cos(2*t)
              -2*Math.cos(3*t)
              -Math.cos(4*t));

    const span = document.createElement("span");
    span.className = "word";
    span.innerText = "I LOVE U";

    span.style.left = (x * 15 + 300) + "px";
    span.style.top  = (y * 15 + 300) + "px";

    span.style.animationDelay = `${Math.random()*2}s`;

    heart.appendChild(span);
}
</script>

</body>
</html>
